<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RE-CYCLE AI | Industrial Interface</title>
    <style>
        :root { --neon: #00f2fe; --bg: #0a0a0c; --panel: rgba(20, 20, 25, 0.8); }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: 'Segoe UI', monospace; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Navigation */
        #nav { width: 80px; border-right: 1px solid #333; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        
        /* Main Layout */
        #main { flex: 1; display: grid; grid-template-columns: 1fr 350px; gap: 20px; padding: 20px; }
        
        .card { background: var(--panel); border: 1px solid #333; border-radius: 8px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        #video-feed { width: 100%; border-radius: 4px; border: 1px solid var(--neon); }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-box { border-left: 3px solid var(--neon); padding: 10px; background: #15151b; }
        
        h2 { color: var(--neon); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; }
        .value { font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="nav"> 🔴 🟡 🟢 </div>
    
    <div id="main">
        <div class="card">
            <h2>Live Computer Vision Feed</h2>
            <div id="camera-container"></div>
            <div id="result-label" style="font-size: 2rem; color: #fff; margin-top: 10px;">SYSTEM STANDBY</div>
        </div>
        
        <div class="card">
            <h2>Process Analytics</h2>
            <canvas id="chartCanvas"></canvas>
            <div class="stat-grid">
                <div class="stat-box">Plastic <div class="value" id="count-plastic">0</div></div>
                <div class="stat-box">Paper <div class="value" id="count-paper">0</div></div>
            </div>
            <button onclick="startAI()" style="width: 100%; margin-top: 20px; padding: 10px; background: transparent; border: 1px solid var(--neon); color: var(--neon); cursor: pointer;">
                INITIALIZE SENSORS
            </button>
        </div>
    </div>
</body>
</html>
